<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ListingClick - No bother with listings, leave it to us!</title>
    <meta name="description" content="AI-powered listing optimizer for Amazon, Shopify, Etsy. Generate compliant, multi-language listings in seconds.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif;
            background: #FFFFFF;
            color: #1A1D26;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Nav */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #F0F1F3;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #1A1D26;
        }

        .nav-logo {
            width: 160px;
            height: 160px;
        }

        .nav-brand-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .lang-switch {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            background: #FFFFFF;
            color: #6B7280;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-switch:hover {
            border-color: #0099CC;
            color: #0099CC;
        }

        .lang-switch svg {
            width: 16px;
            height: 16px;
        }

        .nav-login {
            padding: 8px 20px;
            border: 1px solid #0099CC;
            border-radius: 8px;
            background: transparent;
            color: #0099CC;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-login:hover {
            background: #0099CC;
            color: #FFFFFF;
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 220px 24px 80px;
            text-align: center;
        }

        .hero-slogan {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -1.5px;
            color: #1A1D26;
            margin-bottom: 16px;
            max-width: 700px;
        }

        .hero-sub {
            font-size: 18px;
            color: #6B7280;
            margin-bottom: 48px;
            max-width: 500px;
        }

        /* Input Area */
        .input-container {
            width: 100%;
            max-width: 640px;
            margin-bottom: 20px;
        }

        .input-box {
            width: 100%;
            min-height: 120px;
            padding: 20px 24px;
            border: 2px solid #E5E7EB;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            color: #1A1D26;
            background: #FAFBFC;
            resize: none;
            outline: none;
            transition: all 0.25s;
            line-height: 1.5;
        }

        .input-box:focus {
            border-color: #0099CC;
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(0, 153, 204, 0.08);
        }

        .input-box::placeholder {
            color: #9CA3AF;
        }

        /* Generate Button */
        .btn-generate {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 48px;
            background: linear-gradient(135deg, #0099CC 0%, #6366F1 100%);
            color: #FFFFFF;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: -0.2px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 153, 204, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .hero-note {
            margin-top: 16px;
            font-size: 14px;
            color: #9CA3AF;
        }

        /* Platform Logos */
        .platforms {
            margin-top: 64px;
            text-align: center;
        }

        .platforms-label {
            font-size: 13px;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .platform-logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .platform-item {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.4;
            transition: opacity 0.3s;
            cursor: default;
        }

        .platform-item:hover {
            opacity: 0.8;
        }

        .platform-icon {
            width: 28px;
            height: 28px;
        }

        .platform-name {
            font-size: 16px;
            font-weight: 600;
            color: #4B5563;
        }

        /* Footer */
        .footer {
            padding: 32px 48px;
            border-top: 1px solid #F0F1F3;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-copy {
            font-size: 13px;
            color: #9CA3AF;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            font-size: 13px;
            color: #9CA3AF;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #0099CC;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                padding: 0 20px;
            }

            .hero {
                padding: 100px 20px 60px;
            }

            .hero-slogan {
                font-size: 32px;
                letter-spacing: -0.8px;
            }

            .hero-sub {
                font-size: 16px;
            }

            .input-box {
                min-height: 100px;
                padding: 16px 20px;
                font-size: 15px;
            }

            .btn-generate {
                padding: 14px 36px;
                font-size: 16px;
                width: 100%;
                justify-content: center;
            }

            .platform-logos {
                gap: 24px;
            }

            .footer {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <a href="#" class="nav-brand">
            <img src="logo.png" alt="ListingClick" class="nav-logo">
        </a>
        <div class="nav-right">
            <button class="lang-switch" id="langBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                English
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 5l3 3 3-3"></path>
                </svg>
            </button>
            <a href="#" class="nav-login">Sign In</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="hero">
        <h1 class="hero-slogan">No bother with listings,<br>leave it to us!</h1>
        <p class="hero-sub">AI-powered listings for every marketplace — in seconds.</p>

        <div class="input-container">
            <textarea class="input-box" placeholder="Paste your product link, describe your product, or upload an image..." rows="4"></textarea>
        </div>

        <button class="btn-generate" id="generateBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            Generate
        </button>

        <p class="hero-note">Free · No signup required</p>

        <!-- Platform Logos -->
        <div class="platforms">
            <p class="platforms-label">Works with</p>
            <div class="platform-logos">
                <div class="platform-item">
                    <svg class="platform-icon" viewBox="0 0 24 24" fill="none">
                        <!-- Amazon flat: bold 'a' with smile arrow -->
                        <circle cx="10" cy="11.5" r="4.5" stroke="currentColor" stroke-width="2.4" fill="none"/>
                        <line x1="14.5" y1="7" x2="14.5" y2="16" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
                        <path d="M4 19c3.5 2 8 2 11.5 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M14.5 18.5l1.5 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="platform-name">Amazon</span>
                </div>
                <div class="platform-item">
                    <svg class="platform-icon" viewBox="0 0 24 24" fill="currentColor">
                        <!-- Shopify flat: shopping bag -->
                        <path d="M7.5 7L9 2.5c.2-.6.7-1 1.3-1h3.4c.6 0 1.1.4 1.3 1L16.5 7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <rect x="4" y="7" width="16" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M9.5 7c0 0 .5 2.5 2.5 2.5s2.5-2.5 2.5-2.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <span class="platform-name">Shopify</span>
                </div>
                <div class="platform-item">
                    <svg class="platform-icon" viewBox="0 0 24 24" fill="currentColor">
                        <!-- Etsy flat: bold E -->
                        <rect x="4" y="3" width="16" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M8 8h8M8 12h6M8 16h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="platform-name">Etsy</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-copy">© 2026 ListingClick. All rights reserved.</p>
        <div class="footer-links">
            <a href="#">Terms</a>
            <a href="#">Privacy</a>
            <a href="#">Contact</a>
        </div>
    </footer>

</body>
</html>

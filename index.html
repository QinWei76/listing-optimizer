<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ListingClick - No bother with listings, leave it to us!</title>
    <meta name="description" content="AI-powered listing optimizer for Amazon, Shopify, Etsy. Generate compliant, multi-language listings in seconds.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif;
            background: #FFFFFF;
            color: #1A1D26;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Nav */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #F0F1F3;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #1A1D26;
        }

        .nav-logo {
            width: 56px;
            height: 56px;
        }

        .nav-brand-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .lang-switch {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            background: #FFFFFF;
            color: #6B7280;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-switch:hover {
            border-color: #0099CC;
            color: #0099CC;
        }

        .lang-switch svg {
            width: 16px;
            height: 16px;
        }

        .nav-login {
            padding: 8px 20px;
            border: 1px solid #0099CC;
            border-radius: 8px;
            background: transparent;
            color: #0099CC;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-login:hover {
            background: #0099CC;
            color: #FFFFFF;
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 80px;
            text-align: center;
        }

        .hero-slogan {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -1.5px;
            color: #1A1D26;
            margin-bottom: 16px;
            max-width: 700px;
        }

        .hero-sub {
            font-size: 18px;
            color: #6B7280;
            margin-bottom: 48px;
            max-width: 500px;
        }

        /* Input Area */
        .input-container {
            width: 100%;
            max-width: 640px;
            margin-bottom: 20px;
        }

        .input-box {
            width: 100%;
            min-height: 120px;
            padding: 20px 24px;
            border: 2px solid #E5E7EB;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            color: #1A1D26;
            background: #FAFBFC;
            resize: none;
            outline: none;
            transition: all 0.25s;
            line-height: 1.5;
        }

        .input-box:focus {
            border-color: #0099CC;
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(0, 153, 204, 0.08);
        }

        .input-box::placeholder {
            color: #9CA3AF;
        }

        /* Generate Button */
        .btn-generate {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 48px;
            background: linear-gradient(135deg, #0099CC 0%, #6366F1 100%);
            color: #FFFFFF;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: -0.2px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 153, 204, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .hero-note {
            margin-top: 16px;
            font-size: 14px;
            color: #9CA3AF;
        }

        /* Platform Logos */
        .platforms {
            margin-top: 64px;
            text-align: center;
        }

        .platforms-label {
            font-size: 13px;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        .platform-logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .platform-item {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.4;
            transition: opacity 0.3s;
            cursor: default;
        }

        .platform-item:hover {
            opacity: 0.8;
        }

        .platform-icon {
            width: 28px;
            height: 28px;
        }

        .platform-name {
            font-size: 16px;
            font-weight: 600;
            color: #4B5563;
        }

        /* Footer */
        .footer {
            padding: 32px 48px;
            border-top: 1px solid #F0F1F3;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-copy {
            font-size: 13px;
            color: #9CA3AF;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            font-size: 13px;
            color: #9CA3AF;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #0099CC;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                padding: 0 20px;
            }

            .hero {
                padding: 100px 20px 60px;
            }

            .hero-slogan {
                font-size: 32px;
                letter-spacing: -0.8px;
            }

            .hero-sub {
                font-size: 16px;
            }

            .input-box {
                min-height: 100px;
                padding: 16px 20px;
                font-size: 15px;
            }

            .btn-generate {
                padding: 14px 36px;
                font-size: 16px;
                width: 100%;
                justify-content: center;
            }

            .platform-logos {
                gap: 24px;
            }

            .footer {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <a href="#" class="nav-brand">
            <img src="logo.png" alt="ListingClick" class="nav-logo">
        </a>
        <div class="nav-right">
            <button class="lang-switch" id="langBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                English
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 5l3 3 3-3"></path>
                </svg>
            </button>
            <a href="#" class="nav-login">Sign In</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="hero">
        <h1 class="hero-slogan">No bother with listings,<br>leave it to us!</h1>
        <p class="hero-sub">AI-powered listings for every marketplace — in seconds.</p>

        <div class="input-container">
            <textarea class="input-box" placeholder="Paste your product link, describe your product, or upload an image..." rows="4"></textarea>
        </div>

        <button class="btn-generate" id="generateBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
            Generate
        </button>

        <p class="hero-note">Free · No signup required</p>

        <!-- Platform Logos -->
        <div class="platforms">
            <p class="platforms-label">Works with</p>
            <div class="platform-logos">
                <div class="platform-item">
                    <svg class="platform-icon" viewBox="0 0 24 24" fill="#FF9900">
                        <path d="M.045 18.02c.072-.116.187-.124.348-.022 3.636 2.394 8.27 2.73 12.611.986.298-.113.558-.062.477.242-.103.382-.343.86-.644 1.092-.32.25-.78.47-1.243.67-4.559 1.836-9.382 1.483-12.097-.88-.17-.145-.255-.32-.176-.484.06-.128.204-.224.424-.604zm8.135-1.112c.33-.056.42.196.37.442-.42 2.076-.993 3.927-1.89 5.72-.326.646-.896.385-.693-.14.79-2.072 1.552-3.965 2.213-6.022zm14.878-.136c-.194-.456-.614-.54-1.006-.412-.54.176-1.094.38-1.63.596-2.586 1.04-4.69 2.748-5.63 5.44-.08.228.07.33.28.274.66-.176 1.34-.38 1.94-.68 2.79-1.4 4.77-3.48 6.08-5.42.12-.18.06-.38-.034-.598zM12.03 1.73c.424 0 .87.014 1.32.056 2.64.244 5.04 1.16 6.96 2.72.48.386.24.802-.28.802H15.5c-.36 0-.64.24-.68.6l-.48 4.68c-.04.4.2.64.56.64h5.08c.52 0 .68.38.48.8-.76 1.56-2.28 3.72-4.48 5.36-2.2 1.64-4.84 2.48-7.72 2.48-4.48 0-7.68-2.4-7.68-7.28 0-3.76 1.64-7 4.72-9.2C7.6 1.92 9.67 1.52 12.03 1.73z"/>
                    </svg>
                    <span class="platform-name">Amazon</span>
                </div>
                <div class="platform-item">
                    <svg class="platform-icon" viewBox="0 0 24 24" fill="#95BF47">
                        <path d="M15.337 23.979l7.216-1.561s-2.613-17.6-2.634-17.66a.874.874 0 00-.717-.538c-.026-.001-1.565-.001-1.565-.001s-1.054-1.04-1.54-1.52c-.06-.06-.13-.1-.2-.12L14.13 2.02c-.04-.012-.08-.016-.12-.016l-.01.017-1.23.56c-.38-1.1-1.06-2.12-2.22-2.12h-.07c-.74-.66-1.6-1-2.4-1-7.38 0-7.42 7.72-7.42 8.08 0 .16.03.31.08.44l3.39 3.86c-.01-.14-.01-.28-.01-.42 0-5.16 2.36-6.56 4.36-6.56.36 0 .66.06.92.16L8.2 12.6l2.74-2.36c.52.48.88 1.16.92 2.04 0 .04 0 .08.01.12l-.56 16.58c0 .16.04.32.12.44l1.92 2.56h2z"/>
                    </svg>
                    <span class="platform-name">Shopify</span>
                </div>
                <div class="platform-item">
                    <svg class="platform-icon" viewBox="0 0 24 24" fill="#F1641E">
                        <path d="M8.2 1.6c.5-.2 3.2-.6 3.2-.6l1.8 7.3-3.5.8L8.2 1.6zM.3 8.3C-.1 7.2.3 6.2 1.3 5.7c.8-.4 2-.6 2-.6s-.3-1.6-.3-1.6 2-.5 3.2-.7L8 9.6 4.5 10.4.3 8.3zM20.5 17.8c-.8.3-1.6.1-2.4-.4L21 7l3.2.7-3.7 10.1z"/>
                        <path d="M18.1 17.4c-1.4-.9-2-2.6-1.4-4.4.6-1.7 2.3-2.6 4-2.2L22 7l-3.2-.7-.8 2.2-3.5-.8.8-2.3-3.3-.8-.8 2.3-3.3-.7-1 2.7 3.3.7-.8 2.3-3.3-.7-1 2.7 3.3.7-.8 2.2 3.3.7.8-2.2 3.5.8-.8 2.2 3.3.7 1-2.5z"/>
                    </svg>
                    <span class="platform-name">Etsy</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-copy">© 2026 ListingClick. All rights reserved.</p>
        <div class="footer-links">
            <a href="#">Terms</a>
            <a href="#">Privacy</a>
            <a href="#">Contact</a>
        </div>
    </footer>

</body>
</html>

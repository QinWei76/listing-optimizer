<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow: auto; }
    </style>
</head>
<body>
    <h1>SiliconFlow API Test</h1>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const p = document.createElement('p');
            if (type === 'success') p.className = 'success';
            if (type === 'error') p.className = 'error';
            p.textContent = msg;
            output.appendChild(p);
        }
        
        async function testAPI() {
            log('Testing SiliconFlow API...');
            
            const API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
            const API_KEY = 'a5e0b9754c8d4e2095789395e8095b7f.FlbLSFBabstZEMxV';
            const MODEL = 'glm-4-flash';
            
            try {
                log('Sending request...');
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: 'system', content: 'You are a JSON-only API. Return ONLY valid JSON.' },
                            { role: 'user', content: 'Generate a product title for wireless earbuds. Return: {"title": "..."}' }
                        ],
                        temperature: 0.3,
                        max_tokens: 500
                    })
                });
                
                log(`Response status: ${res.status} ${res.statusText}`, res.ok ? 'success' : 'error');
                
                const data = await res.json();
                log('Response data:', 'info');
                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(data, null, 2);
                output.appendChild(pre);
                
                if (data.choices && data.choices[0]) {
                    const content = data.choices[0].message.content;
                    log(`Content: ${content}`, 'success');
                    
                    try {
                        const parsed = JSON.parse(content);
                        log('JSON parsed successfully!', 'success');
                        log(`Parsed: ${JSON.stringify(parsed)}`, 'success');
                    } catch (e) {
                        log(`JSON parse failed: ${e.message}`, 'error');
                    }
                }
                
            } catch (err) {
                log(`Error: ${err.message}`, 'error');
                console.error('Test error:', err);
            }
        }
        
        testAPI();
    </script>
</body>
</html>
